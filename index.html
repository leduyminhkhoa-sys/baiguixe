<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../CSS/register.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div
      style="height: 100vh"
      class="container d-flex justify-content-center align-items-center"
    >
      <form id="formRegister" style="width: 400px">
        <h3 style="color: white;" class="text-center">Đăng Ký Tài Khoản</h3>

        
        <div class="mb-3">
          <label for="username" style="color: white;" class="form-label">Họ Và Tên</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Nhập họ và tên"
          />
          <div id="userNameError" style="color:red; display:none;">
            Tên không được để trống
          </div>
        </div>

       
        <div class="mb-3">
          <label for="email" style="color: white;" class="form-label">Email</label>
          <input
            type="text"
            class="form-control user_email"
            id="email"
            placeholder="Nhập email"
          />
        <div id="emailError" style="color:red; display:none;">
          Email không được để trống
        </div>
        </div>

        
        <div class="mb-3">
          <label for="password" style="color: white;" class="form-label">Mật Khẩu</label>
          <input
            type="password"
            class="form-control user_password"
            id="password"
            placeholder="Nhập mật khẩu"
          />
          <div id="passwordError" style="color:red; display:none;">
            Mật khẩu không được để trống</div>
        </div>

        
        <div class="mb-3">
          <label for="rePassword" style="color: white;" class="form-label">Nhập Lại Mật Khẩu</label>
          <input
            type="password"
            class="form-control"
            id="rePassword"
            placeholder="Nhập lại mật khẩu"
          />
          <div id="rePasswordError" style="color:red; display:none;">
            Mật khẩu không được để trống
          </div>
        </div>

        <button type="button" class="btn btn-danger" id="btn_login" style="width: 100%">
          Đăng ký
        </button>

        <p style="color: white;" class="text-center mt-2">
          Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a>
        </p>
      </form>
    </div>
  </body>
</html>
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";

    // https://firebase.google.com/docs/web/setup#available-libraries

  authDomain: "jsa13-17f19.firebaseapp.com",
  projectId: "jsa13-17f19",
  storageBucket: "jsa13-17f19.firebasestorage.app",
  messagingSenderId: "509501570441",
  appId: "1:509501570441:web:c81ed5a0003c0a93967558"
};

  
  // Initialize Firebase
  const app = initializeApp(firebaseConfig);

  // B1
  const auth = getAuth(app);

  // B2
  const eleBtn = document.querySelector("#btn_login");

  eleBtn.addEventListener("click", () => {

    const email = document.querySelector(".user_email").value
    const password = document.querySelector(".user_password").value

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // Signed up
        const user = userCredential.user;
        // ...
      })
      .catch((error) => {
        const errorCode = error.code;
        const errorMessage = error.message;
        // ...
      });
  });
</script>
</body>
</html>
