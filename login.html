<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="../CSS/style.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous" 
      />
  </head>
  <body>
    <div 
    style="height: 100vh" 
    class="container d-flex justify-content-center align-items-center">
      <form id="formLogin" style="width: 400px;">
        <h3 style="color: rgb(0, 0, 0)" class="text-center">Đăng Nhập Tài Khoản</h3>
        <div class="mb-3">
            <div class="mb-3">
          <label for="email" style="color: rgb(2, 1, 1)" class="form-label"
            >Email</label
          >
          <input
            type="text"
            class="form-control"
            id="email"
            placeholder="Nhập email "
          />
        </div>
        <div class="mb-3">
            <div class="mb-3">
          <label for="password" style="color: rgb(0, 0, 0)" class="form-label"
            >Mật Khẩu</label
          >
          <input
            type="text"
            class="form-control"
            id="password"
            placeholder="Nhập mật khẩu "
          />
        </div>
        <div id="alertError" style="display: none;" class="alert alert-danger" role="alert">
     Email Hoặc Mật Khẩu không đúng.
</div>
        <div>
            <button type="submit" style="width: 100%" type="button" class="btn btn-danger">Đăng nhập</button>
        </div>
        <p style="color: rgb(9, 8, 8)" class="text-center mt-2">
            Bạn chưa có tài khoản? <a href="./register.html">Đăng ký</a>
        </p>
      </form>
    </div>
    <!--SCRIPT-->
    <script src="../JS/login.js"></script>
  </body>
</html>
