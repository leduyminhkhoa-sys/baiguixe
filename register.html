<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div
      style="height: 100vh"
      class="container d-flex justify-content-center align-items-center"
    >
      <form id="formRegister" style="width: 400px">
        <h3 style="color: rgb(0, 0, 0);" class="text-center">Đăng Ký Tài Khoản</h3>

        
        <div class="mb-3">
          <label for="username" style="color: rgb(0, 0, 0);" class="form-label">Họ Và Tên</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Nhập họ và tên"
          />
          <div id="userNameError" style="color:red; display:none;">
            Tên không được để trống
          </div>
        </div>

       
        <div class="mb-3">
          <label for="email" style="color: rgb(0, 0, 0);" class="form-label">Email</label>
          <input
            type="text"
            class="form-control"
            id="email"
            placeholder="Nhập email"
          />
        <div id="emailError" style="color:red; display:none;">
          Email không được để trống
        </div>
        </div>

        
        <div class="mb-3">
          <label for="password" style="color: rgb(0, 0, 0);" class="form-label">Mật Khẩu</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Nhập mật khẩu"
          />
          <div id="passwordError" style="color:red; display:none;">
            Mật khẩu không được để trống</div>
        </div>

        
        <div class="mb-3">
          <label for="rePassword" style="color: rgb(0, 0, 0);" class="form-label">Nhập Lại Mật Khẩu</label>
          <input
            type="password"
            class="form-control"
            id="rePassword"
            placeholder="Nhập lại mật khẩu"
          />
          <div id="rePasswordError" style="color:red; display:none;">
            Mật khẩu không được để trống
          </div>
        </div>

        <button type="submit" class="btn btn-danger" style="width: 100%">
          Đăng ký
        </button>

        <p style="color: rgb(0, 0, 0);" class="text-center mt-2">
          Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a>
        </p>
      </form>
      
      <script src="../JS/register.js"></script>
    </div>
  </body>
</html>
