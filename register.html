<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div
      style="height: 100vh"
      class="container d-flex justify-content-center align-items-center"
    >
      <form id="formRegister" style="width: 400px">
        <h3 style="color: rgb(0, 0, 0);" class="text-center">Đăng Ký Tài Khoản</h3>

        
        <div class="mb-3">
          <label for="username" style="color: rgb(0, 0, 0);" class="form-label">Họ Và Tên</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Nhập họ và tên"
          />
          <div id="userNameError" style="color:red; display:none;">
            Tên không được để trống
          </div>
        </div>

       
        <div class="mb-3">
          <label for="email" style="color: rgb(0, 0, 0);" class="form-label">Email</label>
          <input
            type="text"
            class="form-control"
            id="email"
            placeholder="Nhập email"
          />
        <div id="emailError" style="color:red; display:none;">
          Email không được để trống
        </div>
        </div>

        
        <div class="mb-3">
          <label for="password" style="color: rgb(0, 0, 0);" class="form-label">Mật Khẩu</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Nhập mật khẩu"
          />
          <div id="passwordError" style="color:red; display:none;">
            Mật khẩu không được để trống</div>
        </div>

        
        <div class="mb-3">
          <label for="rePassword" style="color: rgb(0, 0, 0);" class="form-label">Nhập Lại Mật Khẩu</label>
          <input
            type="password"
            class="form-control"
            id="rePassword"
            placeholder="Nhập lại mật khẩu"
          />
          <div id="rePasswordError" style="color:red; display:none;">
            Mật khẩu không được để trống
          </div>
        </div>

        <button type="submit" class="btn btn-danger" style="width: 100%">
          Đăng ký
        </button>

        <p style="color: rgb(0, 0, 0);" class="text-center mt-2">
          Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a>
        </p>
      </form>
      
      <script src="register.js">
        // lấy ra elements của trang

const formRegister = document.getElementById("formRegister");
const userNameElement = document.getElementById("username");
const emailElement = document.getElementById("email");
const passwordElement = document.getElementById("password");
const rePasswordElement = document.getElementById("rePassword");

//Element liên quan đến lỗi
const userNameError = document.getElementById("userNameError");
const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");
const rePasswordError = document.getElementById("rePasswordError");

// Lấy dữ liệu từ localStorage
const userLocal = JSON.parse(localStorage.getItem("users")) || [];

/**
 * Validate địa chỉ email
 *  @param {*} email : chuỗi email người dùng nhập vào
 * @returns: Dữ liệu nếu email đúng định dạng, undified nếu email không đúng định dạng
 * Author: LDMK(30/11/2025)
 */

function validateEmail(email) {
  return String(email)
    .toLowerCase()
    .match(
      /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|.(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/,
    );
}

//Lắng nghe sự kiện submit form đăng ký tài khoản
formRegister.addEventListener("submit", function (e) {
  //Ngăn chặn sự kiện load lại trang
  e.preventDefault();

  // Validate dữ liệu đầu vào
  if (!userNameElement.value) {
    //Hiển thị lỗi
    userNameError.style.display = "block";
  } else {
    // Ẩn lỗi
    userNameError.style.display = "none";
  }

  // Validate dữ liệu đầu vào
  if (!emailElement.value) {
    //Hiển thị lỗi mail trống
    emailError.style.display = "block";
  } else {
    // Ẩn lỗi thông báo mail trống
    emailError.style.display = "none";
    // Kiểm tra định dạng email
    if (!validateEmail(emailElement.value)) {
      // Hiển thị lỗi
      emailError.style.display = "block";
      emailError.innerHTML = "Email không đúng định dạng";
    }
  }

  // Validate dữ liệu đầu vào
  if (!passwordElement.value) {
    //Hiển thị lỗi mật khẩu trống
    passwordError.style.display = "block";
  } else {
    // Ẩn tb lỗi mk
    passwordError.style.display = "none";
  }

  // Validate dữ liệu đầu vào
  if (!rePasswordElement.value) {
    //Hiển thị lỗi
    rePasswordError.style.display = "block";
  } else {
    // Ẩn lỗi
    rePasswordError.style.display = "none";
  }

  // Kiểm tra mật khẩu với nhập lại mật khẩu
  if (passwordElement.value !== rePasswordElement.value) {
    rePasswordError.style.display = "block";
    rePasswordError.innerHTML = "Mật khẩu không khớp";
  }

  // Gửi dữ liệu từ form lên localStorage
  if (
    userNameElement.value &&
    emailElement.value &&
    passwordElement.value &&
    rePasswordElement.value &&
    passwordElement.value === rePasswordElement.value &&
    validateEmail(emailElement.value)
  ) {
    //Lấy dữ liệu từ form và gộp thành đối tượng user
    const user = {
      userId: Math.ceil(Math.random() * 100000000),
      userName: userNameElement.value,
      email: emailElement.value,
      password: passwordElement.value,
    };

    //Push user vào trong mảng userLocal
    userLocal.push(user);

    //Lưu trữ dữ liệu lên local
    localStorage.setItem("users", JSON.stringify(userLocal));

    setTimeout(function () {
      //Chuyển hướng về trang đăng nhập sau 1s
      window.location.href = "login.html";
    }, 1000);
  }
});

      </script>
    </div>
  </body>
</html>
